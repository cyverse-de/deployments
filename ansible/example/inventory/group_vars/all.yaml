# Plaintext de_grouper password — documentation only, not consumed.
# Default: replace_me
# ldap_de_grouper_pw: replace_me

# SSHA hash of the ldap_reader service-account password.
# Default: "{SSHA}replace_me_with_a_real_hash"
# ldap_ldap_reader_pw_hash: "{SSHA}..."

# Plaintext ldap_reader password — documentation only, not consumed.
# Default: replace_me
# ldap_ldap_reader_pw: replace_me
