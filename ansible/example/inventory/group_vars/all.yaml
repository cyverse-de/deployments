# =====================================================================
# Service replicas & pod anti-affinity
# =====================================================================
# Each Discovery Environment service Deployment ships with a replica
# count and (for most) a required pod anti-affinity rule that spreads
# its pods across distinct nodes. Both are now per-service variables,
# rendered into the manifest at deploy time from
# `roles/services/<svc>/templates/k8s/*.j2`.
#
# `<svc>_replicas` sets `spec.replicas`. `<svc>_pod_anti_affinity`
# (a boolean) toggles the podAntiAffinity block: set it to `false` to
# drop the rule entirely, e.g. on a single- or two-node cluster where a
# required anti-affinity would leave replicas permanently Pending.
#
# Names are prefixed with the service (hyphens become underscores) so
