# Seed credentials
# ---------------------------------------------------------------------
# slapd.conf and the seed LDIF are rendered from the *_hash values below
# — those are the ones actually applied. The matching plaintext
# variables are kept alongside them for documentation only and are not
# consumed. Generate each hash with `slappasswd -h '{SSHA}'`.

# SSHA hash of the LDAP root/manager password.
# Default: "{SSHA}replace_me_with_a_real_hash"
