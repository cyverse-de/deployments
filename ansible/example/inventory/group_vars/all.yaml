# =====================================================================
# Phase 3: HAProxy Load Balancer
# =====================================================================
# Variables consulted by `kubernetes.yml --tags haproxy` (installs
# HAProxy on the `k8s_api_proxy` hosts and load-balances the Kubernetes
# API, konnectivity, and controller-join ports across the hosts in the
# `k8s_controllers` inventory group).
#
# Run this phase before the `create-cluster` pass — the controllers
# register with each other through the load balancer, so it has to be in
# place first.
#
# This phase runs the `haproxy` and `k8s_haproxy` roles. The base
# `haproxy` role's configuration is fully static; only `k8s_haproxy`
# consults the variable below. The controller backends are taken from
# the `k8s_controllers` inventory group, not from a variable.
#
# The variable below has a default in `roles/common/defaults/main.yml`.
# It is commented out so the file is a no-op as shipped — uncomment the
# line to override the default.
# =====================================================================


# ---------------------------------------------------------------------
# Kubernetes API load balancing
# ---------------------------------------------------------------------

# TCP port the Kubernetes (k0s) API server listens on. HAProxy binds it
# on the `k8s_api_proxy` hosts and balances it across every host in the
# `k8s_controllers` group. Keep it in sync with the value used by the
# `create-cluster` pass. The konnectivity (8132) and controller-join
# (9443) ports are fixed and not configurable here.
# Default: "6443"
# k8s_api_port: "6443"


# =====================================================================
# Phase 4: Kubernetes Node Preparation
# =====================================================================
# Variables consulted by `kubernetes.yml --tags prep-nodes` (GPU drivers,
# timezone, base node prep, firewalld, NVIDIA container toolkit).
#
# Every variable below has a default in `roles/common/defaults/main.yml`.
# All assignments here are commented out so the file is a no-op as
# shipped — uncomment a line to override the default. Variables appear
# in roughly the order they are first consulted during the pass.
# =====================================================================


# ---------------------------------------------------------------------
# Ansible connection
# ---------------------------------------------------------------------

# Path to the Python interpreter on managed nodes. Consulted by Ansible
# itself on every connection, before any task runs.
# Default: /usr/bin/python3
# ansible_python_interpreter: /usr/bin/python3


# ---------------------------------------------------------------------
# Host system
# ---------------------------------------------------------------------

# Timezone written to /etc/timezone and symlinked from /etc/localtime by
# the `timezone` role (k8s_de_workers).
# Default: America/Phoenix
# timezone: America/Phoenix


# ---------------------------------------------------------------------
# Node networking
# ---------------------------------------------------------------------

# Toggle for installing `wireguard-tools` on every k8s node. Treated as
# enabled when undefined — set to false to opt out on hosts that will
# never use Calico's WireGuard encryption.
# Default: undefined (install)
# do_wireguard: true


# ---------------------------------------------------------------------
# Kubernetes component versions
# ---------------------------------------------------------------------
# The three versions below pin the Kubernetes apt/yum repo, the Helm CLI
# binary, and the calicoctl binary that get installed on each node. They
# should be kept in sync with what the later `create-cluster` pass
# actually deploys into the cluster.

# Major.minor of the Kubernetes apt/yum repo configured on each node.
# Default: "1.30"
# k8s_version: "1.30"

# Helm CLI version downloaded to each node.
# Default: "3.16.2"
# helm_version: "3.16.2"

# Version of the `calicoctl` binary installed on each node.
# Default: "3.29.0"
# calico_version: "3.29.0"


# ---------------------------------------------------------------------
# NVIDIA container toolkit (GPU workers only)
# ---------------------------------------------------------------------
# Applied by the `nvidia_container_toolkit` role on k8s_gpu_workers
# after drivers are installed. Both values are passed to `nvidia-ctk
# runtime configure`.

# Container runtime that nvidia-ctk should configure.
# Default: containerd
# nvidia_container_toolkit_runtime: containerd

# Path to the drop-in config file nvidia-ctk writes. The default matches
# the k0s containerd config-fragment directory.
# Default: /etc/k0s/containerd.d/nvidia.toml
# nvidia_container_toolkit_runtime_config_path: /etc/k0s/containerd.d/nvidia.toml


# =====================================================================
# Phase 5: Create the k0s Cluster
# =====================================================================
# Variables consulted by `kubernetes.yml --tags create-cluster` (runs
# `k0sctl apply` against the controllers and workers and writes out the
# resulting kubeconfig).
#
# Run this phase after the HAProxy load balancer (Phase 3) is in place
# and the nodes have been prepared (Phase 4) — k0sctl talks to the API
# through the load balancer and expects the node OS to already be set
# up.
#
# This phase runs locally (`connection: local`) on the first host in
# `k8s_controllers`. It shells out to `k0sctl`, so the `k0sctl` binary
# must be installed on the machine running ansible-playbook (not on the
# controller).
#
# The `k8s_cluster` role does not consult any group_vars. Its behavior
# is governed entirely by two operational inputs:
#
#   1. `k0sctl.yaml` — a static configuration file the role expects to
#      find next to the inventory directory (e.g.
#      `example/k0sctl.yaml` alongside `example/inventory/`). It lists
#      the controller and worker hosts, the k0s version to install, and
#      any cluster-wide k0s configuration. Keep the k0s version in sync
#      with the `k8s_version` configured in Phase 4.
#
#   2. `KUBECONFIG` — environment variable read from the shell running
#      ansible-playbook. It is the *destination* path where this phase
#      writes the newly minted kubeconfig (mode 0600); the file does
#      not need to exist yet, but the variable must be set or the
#      `k0sctl kubeconfig` redirect and the follow-up file task will
#      both fail. Later phases (`de-reqs`, `configure-services`,
#      deploys) read this same path to authenticate against the
#      cluster.
#
# There are no variables to uncomment in this section — it exists only
# to document the prerequisites above.
# =====================================================================


# =====================================================================
# Phase 6: cert-manager
# =====================================================================
# Variables consulted when cert-manager's issuers are created. The
# `cert-manager` tag (`kubernetes.yml --tags cert-manager`) installs the
# cert-manager Helm chart, which takes no group_vars; the issuers that
# consume the variables below are applied later, during the DE
# prerequisites pass.
#
# cert-manager always creates a self-signed default `Issuer` and a
# self-signed default `ClusterIssuer` — NATS and Traefik rely on them for
# in-cluster certificate chains, so cert-manager is installed in every mode.
# The public-facing service certificates are chosen by
# `cert_manager_provider` (see the next subsection).
#
# Every variable below has a default in `roles/common/defaults/main.yml`.
# All assignments here are commented out so the file is a no-op as
# shipped — uncomment a line to override the default.
# =====================================================================


# ---------------------------------------------------------------------
# TLS certificate strategy: cert_manager_provider
# ---------------------------------------------------------------------
# Selects how the public-facing service certificates (DE, user portal,
# VICE, Harbor, Keycloak) are obtained. One of:
#
#   selfsigned  - cert-manager self-signs a CA + leaf certificate per
#                 endpoint (the default).
#   letsencrypt - cert-manager issues the leaf certificates from the
#                 Let's Encrypt ACME ClusterIssuer (configure the
#                 Route53 variables below).
#   external    - cert-manager creates NONE of these certificates; a
#                 cluster admin pre-creates the TLS secrets out of band
#                 (e.g. certs from a third-party CA). Use this when the
#                 certificate lifecycle is managed independently of the
#                 Ansible deploy.
#
# For backward compatibility the default is derived from the legacy
# `cert_manager_use_letsencrypt` toggle: unset -> selfsigned, true ->
# letsencrypt. Set `cert_manager_provider` explicitly to override.
# Default: selfsigned (or letsencrypt if cert_manager_use_letsencrypt is true)
# cert_manager_provider: external
#
# In `external` mode you must create these `kubernetes.io/tls` secrets
# before HTTPS will serve — a Gateway listener whose secret is missing
# simply stays un-Programmed (non-fatal), so ordering vs. the deploy does
# not matter:
#
#   secret name       namespace   hostname
#   ---------------   ---------   ------------------------------------
#   de-tls            ns (qa)     de_hostname
#   user-portal-tls   ns (qa)     portal_hostname
#   vice-tls          ns (qa)     vice_wildcard_fqdn  (needs a WILDCARD cert)
#   harbor-tls        harbor      harbor_fqdn
#   kc-tls            keycloak    keycloak_hostname
#
# The secret names for the DE namespace and Harbor follow the
# de_tls_cert_name / user_portal_tls_cert_name / vice_tls_cert_name /
# harbor_tls_cert_name variables; the Keycloak secret name (kc-tls) is
# fixed. Create each from the CA-issued cert and key, for example:
#
#   kubectl -n qa create secret tls de-tls --cert=de.crt --key=de.key
#   # ...repeat for user-portal-tls and vice-tls in namespace qa,
#   #    harbor-tls in namespace harbor, kc-tls in namespace keycloak.


# ---------------------------------------------------------------------
# Let's Encrypt / Route53
# ---------------------------------------------------------------------
# These variables only take effect when `cert_manager_provider` is
# `letsencrypt`. See
# https://cert-manager.io/docs/configuration/acme/dns01/route53/ for the
# IAM policy the access key needs.

# Legacy toggle, kept for backward compatibility: when true it selects the
# `letsencrypt` provider (see cert_manager_provider above). Prefer setting
# cert_manager_provider directly.
# Default: false
# cert_manager_use_letsencrypt: true

# AWS region for the Route53 DNS-01 solver.
# Default: us-east-1
# cert_manager_le_aws_region: us-east-1

# AWS access key ID stored in the Route53 credentials secret.
# Default: replace_me
# cert_manager_le_aws_access_key_id: replace_me

# AWS secret access key stored in the Route53 credentials secret.
# Default: replace_me
# cert_manager_le_aws_secret_access_key: replace_me

# Name of the Secret (in the cert-manager namespace) holding the Route53
# credentials.
# Default: cert-manager-letsencrypt-aws-creds
# cert_manager_le_aws_creds_secret_name: cert-manager-letsencrypt-aws-creds

# Name of the Let's Encrypt ClusterIssuer.
# Default: letsencrypt
# cert_manager_le_issuer_name: letsencrypt

# Contact email registered with the ACME account. Defaults to the shared
# `email_dest` address; set either one.
# Default: "{{ email_dest }}"
# cert_manager_le_issuer_email: someone@example.org

# ACME directory URL. Defaults to the production endpoint; switch to the
# staging endpoint (https://acme-staging-v02.api.letsencrypt.org/directory)
# while testing to avoid hitting production rate limits.
# Default: https://acme-v02.api.letsencrypt.org/directory
# cert_manager_le_issuer_acme_server: https://acme-v02.api.letsencrypt.org/directory

# Name of the Secret cert-manager stores the ACME account private key in.
# Default: letsencrypt-issuer-key
# cert_manager_le_issuer_acme_secret_name: letsencrypt-issuer-key


# =====================================================================
# Gateway / ingress controllers
# =====================================================================
# The gateway and ingress controllers install as their own roles ahead
# of Harbor and the DE prerequisites pass, so Harbor (and the DE
# services) can be fronted by an Ingress or a Gateway route. ingress-nginx
# always installs (the `ingress_nginx` role); Traefik installs only when
# `gateway_provider` is "traefik" (the `traefik` role). Both keep the
# `de-reqs` tag alongside their own, so `--tags de-reqs` still brings
# them up; install just one with `--tags ingress-nginx` or
# `--tags traefik`.
#
# Run this after cert-manager (Phase 6). Traefik's TLS certificate is
# issued through cert-manager using the self-signed `default-cluster-issuer`
# that the de-reqs pass creates; the certificate reconciles once that
# issuer exists, so the ordering between this section and Phase 7 is not
# strict.
#
# Every variable below has a default in `roles/common/defaults/main.yml`.
# All assignments here are commented out so the file is a no-op as
# shipped — uncomment a line to override the default.
# =====================================================================


# ---------------------------------------------------------------------
# Gateway provider
# ---------------------------------------------------------------------

# Which gateway controller to install. When set to "traefik" the Traefik
# subsection below applies; other values skip the `traefik` role. The
# ingress-nginx controller is installed regardless of this setting.
# Default: traefik
# gateway_provider: traefik


# ---------------------------------------------------------------------
# Traefik (only when gateway_provider == "traefik")
# ---------------------------------------------------------------------
# Traefik issues its TLS certificate through cert-manager using the
# self-signed `default-cluster-issuer` created in the issuers step, so
# cert-manager must already be installed.

# Version tag of the Kubernetes Gateway API CRDs applied before Traefik.
# Default: v1.4.0
# gateway_api_crd_version: v1.4.0

# Namespace Traefik and its certificates are installed into.
# Default: traefik
# traefik_namespace: traefik

# Name of the self-signed CA Certificate (and its backing Secret).
# Default: traefik-selfsigned-ca
# traefik_ca_name: traefik-selfsigned-ca

# Validity period of the self-signed CA certificate.
# Default: 8766h
# traefik_ca_duration: 8766h

# How long before CA expiry cert-manager renews it.
# Default: 240h
# traefik_ca_renew_before: 240h

# Name of the CA-backed Issuer that signs the Traefik TLS certificate.
# Default: traefik-ca-issuer
# traefik_issuer_name: traefik-ca-issuer

# Name of the Traefik TLS Certificate (and its backing Secret).
# Default: traefik-tls
# traefik_cert_name: traefik-tls

# Validity period of the Traefik TLS certificate.
# Default: 2160h
# traefik_cert_duration: 2160h

# How long before TLS expiry cert-manager renews it.
# Default: 240h
# traefik_cert_renew_before: 240h

# NodePort Traefik exposes for plain HTTP.
# Default: 31380
# traefik_http_port: 31380

# NodePort Traefik exposes for HTTPS.
# Default: 31383
# traefik_https_port: 31383


# ---------------------------------------------------------------------
# ingress-nginx
# ---------------------------------------------------------------------
# The ingress-nginx controller is always installed (the `ingress_nginx`
# role).

# NodePort the ingress-nginx controller exposes for plain HTTP.
# Default: 31343
# ingress_nginx_http_port: 31343

# NodePort the ingress-nginx controller exposes for HTTPS.
# Default: 31344
# ingress_nginx_https_port: 31344


# =====================================================================
# Phase 7: DE Prerequisites
# =====================================================================
# Variables consulted by `kubernetes.yml --tags de-reqs` (runs the
# `k8s_de_reqs` role: creates the DE and VICE namespaces and the
# cert-manager issuers, writes the timezone ConfigMap, deploys the
# local-exim mail relay, and creates the Harbor image-pull secret). The
# gateway/ingress controllers it used to install now run earlier as the
# `ingress_nginx` and `traefik` roles (see "Gateway / ingress
# controllers" above).
#
# Run this phase after cert-manager (Phase 6). The cluster-scoped issuers
# (default-cluster-issuer and the Let's Encrypt ClusterIssuer) are created
# earlier by the `cluster_issuers` role so certs can issue before Harbor;
# this pass only creates the namespaced `default-issuer`. The cert-manager
# issuer variables (`cert_manager_*`) are documented under Phase 6.
#
# Every variable below has a default in `roles/common/defaults/main.yml`.
# All assignments here are commented out so the file is a no-op as
# shipped — uncomment a line to override the default. Variables appear in
# roughly the order they are first consulted during the pass.
# =====================================================================


# ---------------------------------------------------------------------
# DE namespaces and TLS hostnames
# ---------------------------------------------------------------------
# This phase creates the `ns` and `vice_ns` namespaces. `ns` and
# `vice_base_domain` are documented in the global settings section at the
# top of this file; the wildcard FQDNs below are baked into the Traefik
# certificate's DNS names (along with `vice_base_domain`).

# Namespace VICE (interactive) apps run in.
# Default: vice-apps
# vice_ns: vice-apps

# Wildcard FQDN for the DE web UI, added to the Traefik certificate.
# Default: "*.cyverse.org"
# ui_wildcard_fqdn: "*.cyverse.org"

# Wildcard FQDN for VICE apps, added to the Traefik certificate. Derived
# from `vice_base_domain` (see the global settings section); override
# only to break that link.
# Default: "*.{{ vice_base_domain }}"
# vice_wildcard_fqdn: "*.cyverse.run"


# ---------------------------------------------------------------------
# local-exim mail relay
# ---------------------------------------------------------------------
# Deploys a small exim relay (in the `ns` namespace) that DE services
# send outbound mail through. It reuses the `timezone` value documented
# under Phase 4 for the container clock.

# Upstream smarthost (host:port) exim forwards mail to.
# Default: "127.0.0.1:25"
# exim_smarthost: "127.0.0.1:25"

# Password exim authenticates to the smarthost with.
# Default: "127.0.0.1"
# exim_password: "127.0.0.1"

# CIDR/host list allowed to relay mail through exim.
# Default: "172.17.0.0/24:127.0.0.1"
# exim_allowed_senders: "172.17.0.0/24:127.0.0.1"

# Replica count for the relay Deployment, and whether its pods carry a
# required anti-affinity rule (one pod per node). Set 1/false on small
# clusters.
# Defaults: 2 / true
# local_exim_replicas: 2
# local_exim_pod_anti_affinity: true


# ---------------------------------------------------------------------
# Argo Installation
# ---------------------------------------------------------------------
# The Discovery Environment uses Argo Workflows to run non-interactive
# analyses. The only configurable settings at this time are the names
# of the namespaces.

# Namespace for Argo Workflows
# Default: argo
# argo_ns: argo

# Namespace for Argo Events
# Default: argo-events
# argo_events_ns: argo-events


# ---------------------------------------------------------------------
# Harbor image-pull secret
# ---------------------------------------------------------------------
# Logs in to the Harbor registry with a robot account and writes the
# resulting dockerconfigjson Secret into the argo and VICE namespaces so
# pods can pull private images.

# Harbor registry URL. Defaults to the shared `registry_hostname`
# (harbor.cyverse.org); set either one.
# Default: "{{ registry_hostname }}"
# harbor_url: harbor.cyverse.org

# Harbor robot account username.
# Default: harbor-robot
# harbor_robot_name: harbor-robot

# Secret/token for the Harbor robot account.
# Default: replace_me
# harbor_robot_secret: replace_me

# Name of the image-pull Secret created in the argo and VICE namespaces.
# Default: vice-image-pull-secret
# vice_image_pull_secret: vice-image-pull-secret

# =====================================================================
# In-cluster storage: Longhorn
# =====================================================================
# Installed by the `longhorn` role, which runs early (before `harbor`,
# `de-reqs`, and `openldap-docker`, all of which depend on a persistent
# volume). Longhorn provides replicated local block storage via a
# StorageClass named `longhorn`, and that class is made the cluster
# default — it is the primary CSI driver installed for general-purpose
# block storage, so PVCs that omit `storageClassName` land on it. (The
# iRODS CSI driver is only for interacting with the data store.)

# Whether to install Longhorn.
# Default: false
# longhorn_enabled: true

# Namespace Longhorn is installed into.
# Default: longhorn-system
# longhorn_namespace: longhorn-system

# Longhorn Helm chart version.
# Default: 1.12.0
# longhorn_version: 1.12.0

# Number of replicas per volume. The default adapts to the cluster size,
# using the worker count capped at 3, so clusters with 1 or 2 nodes don't
# end up with permanently degraded volumes. Set an explicit integer to
# override.
# Default: "{{ [groups['k8s_workers'] | length, 3] | min }}"
# longhorn_replica_count: 3

# On-node directory where Longhorn stores replica data.
# Default: /var/lib/longhorn
# longhorn_data_path: /var/lib/longhorn

# Reclaim policy for the longhorn StorageClass. Retain keeps the data
# when a PVC is deleted; set to Delete to reclaim it automatically.
# Default: Retain
# longhorn_reclaim_policy: Retain

# Where Longhorn stores volume backups. Empty means backups are not
# configured, which is the supported default: Longhorn still creates a
# BackupTarget named `default` with an empty URL, and volume creation
# requires that object to exist. Set this to an NFS or S3 endpoint to
# enable backups, e.g. s3://bucket@us-west-2/ or nfs://host:/path.
# longhorn-manager reads this at startup, so changing it on a running
# cluster requires restarting the longhorn-manager DaemonSet.
# Default: ""
# longhorn_backup_target: s3://my-bucket@us-west-2/

# Name of an existing Secret in longhorn_namespace holding the backup
# target credentials (for S3: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
# AWS_ENDPOINTS). Only needed when longhorn_backup_target is set.
# Default: ""
# longhorn_backup_target_credential_secret: longhorn-backup-secret

# Seconds Longhorn waits before polling the backup store for new backups.
# Set to 0 to disable polling.
# Default: 300
# longhorn_backupstore_poll_interval: 300
# =====================================================================


# =====================================================================
# In-cluster registry: Harbor (optional)
# =====================================================================
# Installed by the `harbor` role (`kubernetes.yml --tags harbor`). It
# deploys the Harbor container registry via its Helm chart, exposed
# through the active gateway/ingress controller with cert-manager-managed
# TLS: under Traefik the role creates a Gateway and the chart emits a
# Gateway API HTTPRoute (expose.type: route) attached to it; otherwise the
# chart's own ingress-nginx Ingress is used. Backed by the external
# PostgreSQL databases created in Phase 2 (see the "Harbor databases"
# subsection there).
#
# This step is OPTIONAL and only runs when the playbook is invoked with
# `--tags harbor`. Skip it when the deployment pulls images from an
# existing, external Harbor (or other registry) — in that case just set
# `registry_hostname` in the global settings at the top of this file and
# leave this section alone.
#
# Ordering: Harbor installs after Longhorn (its registry, chartmuseum,
# and jobservice volumes use the `longhorn` StorageClass) and before the
# DE prerequisites pass. de-reqs builds the Harbor image-pull secret from
# a robot account (`harbor_robot_name` / `harbor_robot_secret`,
# documented under Phase 7), so after installing Harbor create that robot
# account and set its secret before running `--tags de-reqs`.
#
# Every variable below has a default in `roles/common/defaults/main.yml`.
# All assignments here are commented out so the file is a no-op as
# shipped — uncomment a line to override the default.
# =====================================================================


# Public FQDN Harbor is served at, baked into the registry's externalURL.
# Derived from `registry_hostname` (see the global settings section);
# override only to decouple it.
# Default: "{{ registry_hostname }}"
# harbor_fqdn: harbor.cyverse.org

# Namespace Harbor is installed into (created by the role before the chart,
# so the TLS certificate can be issued into it).
# Default: harbor
# harbor_namespace: harbor

# Harbor Helm chart repository.
# Default: https://helm.goharbor.io
# harbor_repo: https://helm.goharbor.io

# Pinned Harbor chart version. 1.18.0+ is required for the Gateway API
# HTTPRoute exposure (expose.type: route) used under Traefik.
# Default: 1.19.1
# harbor_chart_version: 1.19.1

# StorageClass for Harbor's registry, chartmuseum, and jobservice PVCs
# (all ReadWriteMany). Defaults to the longhorn class from the Longhorn
# section above; the database is external, so it needs no volume here.
# Default: longhorn
# harbor_storage_class: longhorn

# Replica count for the Harbor components (portal, core, jobservice,
# registry, chartmuseum, clair, notary).
# Default: 2
# harbor_replicas: 2

# Ingress class used when gateway_provider is not "traefik" (the
# ingress-nginx path). Ignored under Traefik, which fronts Harbor with a
# Gateway/HTTPRoute instead.
# Default: nginx
# harbor_ingress_class_name: nginx

# cert-manager TLS for Harbor. Under cert_manager_provider=selfsigned a CA
# chain is created (harbor-selfsigned-ca -> harbor-ca-issuer -> harbor-tls);
# under letsencrypt harbor-tls is issued directly from the letsencrypt
# ClusterIssuer; under external no cert is created and an admin pre-creates
# the harbor-tls secret (see Phase 6). These names and lifetimes mirror the
# DE service certificates.
# Default: harbor-tls
# harbor_tls_cert_name: harbor-tls

# Name of the self-signed CA Certificate/Issuer secret (self-signed mode).
# Default: harbor-selfsigned-ca
# harbor_tls_ca_name: harbor-selfsigned-ca

# Name of the CA-backed Issuer that signs harbor-tls (self-signed mode).
# Default: harbor-ca-issuer
# harbor_tls_issuer_name: harbor-ca-issuer

# Validity period of the self-signed CA certificate.
# Default: 8766h
# harbor_tls_ca_duration: 8766h

# How long before CA expiry cert-manager renews it.
# Default: 240h
# harbor_tls_ca_renew_before: 240h

# Validity period of the harbor-tls certificate.
# Default: 2160h
# harbor_tls_cert_duration: 2160h

# How long before TLS expiry cert-manager renews it.
# Default: 240h
# harbor_tls_cert_renew_before: 240h
# =====================================================================


# =====================================================================
# In-cluster OpenLDAP (optional)
# =====================================================================
# Installed by the `openldap-docker` role
# (`kubernetes.yml --tags openldap-docker`). It deploys an OpenLDAP
# server inside the cluster, seeded with the DE service accounts and
# groups and backed by a Longhorn persistent volume (so it runs after
# the Longhorn section above).
#
# This step is OPTIONAL and is SKIPPED unless `ldap_in_cluster` is true.
# Leave it disabled when the deployment uses an existing, external LDAP
# directory — in that case set `ldap_uri`, `ldap_base_dn`, and `ldap_cn`
# in the LDAP subsection of the global settings at the top of this file,
# and ignore everything below.
#
# (A standalone, host-based OpenLDAP install is also available via the
# separate `ldap_slapd.yml` playbook and the `[ldap]` inventory group;
# see docs/ldap.md. It is configured independently of the variables
# below.)
#
# Every variable below has a default in `roles/common/defaults/main.yml`.
# All assignments here are commented out so the file is a no-op as
# shipped — uncomment a line to override the default.
# =====================================================================


# Whether to deploy OpenLDAP inside the cluster. Leave false to use an
# external LDAP directory (configured in the global LDAP section above).
# Default: false
# ldap_in_cluster: true

# Namespace the in-cluster OpenLDAP server is installed into.
# Default: openldap
# ldap_ns: openldap

# Base DN (directory suffix) the server is seeded with. Keep it in sync
# with the `ldap_base_dn` used elsewhere in the deployment.
# Default: dc=example,dc=org
# ldap_dn_suffix: dc=example,dc=org

# Number of OpenLDAP replicas. The mdb data volume is per-replica and
# not replicated, so leave this at 1 unless replication is configured.
# Default: 1
# openldap_replicas: 1

# Whether to require the OpenLDAP pods to be scheduled on different
# nodes. Only relevant with more than one replica.
# Default: false
# openldap_pod_anti_affinity: false


