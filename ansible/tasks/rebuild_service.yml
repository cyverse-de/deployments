- name: rebuild {{ svc }} from its release ref
  block:
    # A role without its own skaffold.yaml can't be rebuilt standalone (e.g.
    # vice-operator, which reuses the image built from the app-exposer repo).
    - name: check whether {{ svc }} builds from its own role
      delegate_to: localhost
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/roles/services/{{ svc }}/files/skaffold.yaml"
      register: svc_skaffold

    - name: note {{ svc }} skipped (no skaffold config in its role)
      delegate_to: localhost
      ansible.builtin.set_fact:
        rebuild_skipped: "{{ rebuild_skipped + [svc] }}"
      when: not svc_skaffold.stat.exists

    - name: rebuild {{ svc }}
      when: svc_skaffold.stat.exists
      block:
        - name: read the {{ svc }} build descriptor
          delegate_to: localhost
          ansible.builtin.set_fact:
            release_descriptor: "{{ lookup('file', playbook_dir ~ '/roles/services/' ~ svc ~ '/files/' ~ svc ~ '.json') | from_json }}"

        - name: capture the {{ svc }} image name and tag
          delegate_to: localhost
          ansible.builtin.set_fact:
            release_image: "{{ release_descriptor.builds[0].imageName }}"
            release_tag: "{{ release_descriptor.builds[0].tag }}"

        # A descriptor tag is <imageName>:<ref>@sha256:<digest>; anchor on the
        # image name so a tag that isn't prefixed by the descriptor's own
        # imageName yields an empty ref and is skipped rather than built from
        # garbage. The trailing -dirty (skaffold's gitCommit tagPolicy marks
        # images built from an uncommitted tree) is never part of a real tag,
        # so strip it to recover the clean tag the build came from.
        - name: extract the release ref from the {{ svc }} tag
          delegate_to: localhost
          ansible.builtin.set_fact:
            release_ref: >-
              {{ (release_tag | regex_replace('^' ~ (release_image | regex_escape) ~ ':', '')
                              | regex_replace('@sha256:.*$', '')
                              | regex_replace('-dirty$', ''))
                 if release_tag.startswith(release_image ~ ':') else '' }}

        - name: note {{ svc }} skipped (no ref in descriptor)
          delegate_to: localhost
          ansible.builtin.set_fact:
            rebuild_skipped: "{{ rebuild_skipped + [svc] }}"
          when: release_ref | length == 0

        - name: build and push {{ svc }} at {{ release_ref | default('') }}
          ansible.builtin.include_role:
            name: build-service
          vars:
            project_name: "{{ svc }}"
            git_ref: "{{ release_ref }}"
          when: release_ref | length > 0

        - name: note {{ svc }} rebuilt
          delegate_to: localhost
          ansible.builtin.set_fact:
            rebuilt: "{{ rebuilt + [svc] }}"
          when: release_ref | length > 0
  rescue:
    - name: note {{ svc }} failed
      delegate_to: localhost
      ansible.builtin.set_fact:
        rebuild_failed: "{{ rebuild_failed + [svc] }}"
