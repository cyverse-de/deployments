# Builds a single service image and rewrites roles/services/<project>/files/<project>.json.
#
# Used for CI/CD.
#
# Variables:
#   project:         the name of the service to build.
#   source_repo_dir: directory holding the service source repos
#                    (default: the directory containing this deployments repo).
#   source_repo:     exact path to the git repository containing the project source
#                    (default: <source_repo_dir>/<project>).
#   git_ref:         the git ref to build (default: main).
#   image_registry:  the target image registry (default: harbor.cyverse.org).
#   force_rebuild:   bypass skaffold's artifact cache when true (default: false).
#
# A `docker login` to the target registry must already be in place.

---
- hosts: k8s_controllers[0]
  connection: local
  gather_facts: false
  become: false
  tasks:
    - ansible.builtin.include_role:
        name: "services/{{ project }}"
        tasks_from: build
      tags:
        - build
