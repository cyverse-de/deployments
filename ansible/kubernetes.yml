---
- name: Prepare for PostgreSQL
  hosts: dbms
  become: true
  roles:
    - role: postgresql
    - role: postgresql_access
  tags:
    - install-postgres
    - databases

- name: Initialize dbs
  hosts: dbms
  become: false
  connection: local
  roles:
    - role: postgresql_init
  tags:
    - setup-databases
    - databases

- name: Install GPU drivers
  hosts: k8s_gpu_workers
  become: true
  roles:
    - nvidia_drivers
  tags:
    - install-gpu-drivers
    - prep-nodes
    - add-nodes

# so they can register through the load-balancer, otherwise
# they won't be able to use it.
- name: Set the HAProxy load balancer
  hosts: k8s_api_proxy
  become: true
  roles:
    - role: haproxy
    - role: k8s_haproxy
  tags:
    - haproxy

- name: Set up timezone settings.
  hosts: k8s_de_workers
  become: true
  gather_facts: true
  roles:
    - role: timezone
  tags:
    - timezone
    - prep-nodes
    - add-nodes

- name: Prepare the nodes
  hosts: k8s_nodes
  become: true
  roles:
    - role: k8s_nodes
  tags:
    - prep-nodes
    - add-nodes

- name: Set up firewall
  hosts: k8s_nodes
  become: true
  roles:
    - role: k8s_firewalld
  tags:
    - prep-nodes
    - add-nodes
    - firewall

# Add a playbook/role to call 'k0sctl apply --config <path>'
- name: Set up the k0s cluster
  hosts: k8s_controllers[0]
  connection: local
  gather_facts: false
  become: false
  roles:
    - role: k8s_cluster
      tags:
        - create-cluster
        - add-nodes

    - role: cert-manager
      tags: cert-manager

    - role: argo
      tags:
        - argo
        - de-reqs

    - role: k8s_de_reqs
      tags: de-reqs

    - role: longhorn
      tags: longhorn

    - role: openldap-docker
      tags: openldap-docker

    - role: service_configurations
      tags: configure-services

    - role: secret_loader
      tags:
        - configure-services
        - secrets

    - role: kubernetes_ingress
      tags: ingress

    - role: kubernetes_networking
      tags:
        - networking
        - nodeports

    - role: nats
      tags: nats

    - role: kubernetes_node_feature_discovery
      tags: feature-discovery

    - role: grouper_init
      tags: grouper

    - role: image_cache
      tags: image-cache

- name: Install the nvidia conttainer toolkit
  hosts: k8s_gpu_workers
  become: true
  roles:
    - nvidia_container_toolkit
  tags:
    - nvidia-container-toolkit
    - post-k8s-tasks
    - prep-nodes
    - add-nodes

- name: Create the irods-csi-driver plugin directory
  hosts: k8s_workers
  become: true
  gather_facts: false
  tasks:
    - name: Create the plugin directory
      ansible.builtin.file:
        state: directory
        path: /var/lib/k0s/kubelet/plugins/irods.csi.cyverse.org/
        recurse: true
  tags:
    - irods-csi-driver
    - prep-nodes
    - add-nodes

- name: Create the irods-csi-driver plugins_registry directory
  hosts: k8s_workers
  become: true
  gather_facts: false
  tasks:
    - name: Create the plugin directory
      ansible.builtin.file:
        state: directory
        path: /var/lib/k0s/kubelet/plugins_registry/
        recurse: true
  tags:
    - irods-csi-driver
    - prep-nodes
    - add-nodes

- name: Set up irods-csi-driver
  hosts: k8s_controllers[0]
  connection: local
  become: false
  roles:
    - role: kubernetes_irods_csi_driver
  tags:
    - irods-csi-driver

- name: Deploy a single service
  hosts: k8s_controllers[0]
  connection: local
  gather_facts: false
  become: false
  tags:
    - deploy-single-service
  tasks:
    - name: Deploy a single named service
      ansible.builtin.include_role:
       name: "services/{{ project }}"
       tasks_from: main
      tags:
        - deploy
      when: "'deploy-single-service' in ansible_run_tags"

- name: Deploy all services
  hosts: k8s_controllers[0]
  connection: local
  gather_facts: false
  become: false
  tags:
    - deploy-all-services
  roles:
    - role: services/maintenance-page
    - role: services/analyses
    - role: services/app-exposer
    - role: services/apply-labels
    - role: services/apps
    - role: services/async-tasks
    - role: services/bulk-typer
    - role: services/check-resource-access
    - role: services/clockwork
    - role: services/data-info
    - role: services/de-mailer
    - role: services/de-webhooks
    - role: services/dewey
    - role: services/discoenv-analyses
    - role: services/discoenv-users
    - role: services/email-requests
    - role: services/event-recorder
    - role: services/get-analysis-id
    - role: services/info-typer
    - role: services/infosquito2
    - role: services/iplant-groups
    - role: services/jex-adapter
    - role: services/job-status-listener
    - role: services/job-status-recorder
    - role: services/job-status-to-apps-adapter
    - role: services/kifshare
    - role: services/metadata
    - role: services/notifications
    - role: services/permissions
    - role: services/qms
    - role: services/qms-adapter
    - role: services/requests
    - role: services/resource-usage-api
    - role: services/data-usage-api
    - role: services/subscriptions
    - role: services/timelord
    - role: services/user-info
    - role: services/vice-default-backend
    - role: services/vice-status-listener
    - role: services/search
    - role: services/dashboard-aggregator
    - role: services/terrain
    - role: services/sonora
    - role: services/group-propagator
    - role: services/portal-conductor
    - role: services/portal2
    - role: services/formation
    - role: services/vice-operator

- name: Set up UI haproxy
  become: true
  hosts: de_haproxy
  roles:
    - role: haproxy
    - role: ui_haproxy
  tags:
    - haproxy
    - ui-haproxy

- name: Set up additional services
  become: false
  gather_facts: false
  hosts: k8s_controllers[0]
  connection: local
  roles:
    - role: cronjobs
      tags: cronjobs

    - role: keycloak_install
      tags: keycloak
      when: "'keycloak' in ansible_run_tags"

    - role: harbor
      tags: harbor
      when: "'harbor' in ansible_run_tags"

    - role: jaeger
      tags: jaeger
      when: "'jaeger' in ansible_run_tags"

    - role: argo_resources
      tags:
        - argo-resources
        - argo
