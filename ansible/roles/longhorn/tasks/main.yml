---
- name: Install Longhorn replicated block storage
  delegate_to: localhost
  run_once: true
  when: longhorn_enabled | bool
  environment:
    KUBECONFIG: "{{ lookup('env', 'KUBECONFIG') }}"
  block:
    # The chart auto-creates a StorageClass named "longhorn" (matching
    # harbor_storage_class) and makes it the cluster default, since Longhorn is
    # the primary CSI driver installed for general-purpose block storage (the
    # iRODS CSI driver is only for the data store). Replica count is configured
    # via the persistence and defaultSettings values so it can adapt to clusters
    # with fewer than 3 nodes.
    # defaultBackupStore is only sent when a backup target is configured. The
    # chart omits a value from the longhorn-default-resource ConfigMap when it
    # is null but writes an empty key when it is "", so passing empty strings
    # would change that ConfigMap on every existing install for no benefit.
    # Longhorn creates its `default` BackupTarget with an empty URL either way.
    - name: Install the longhorn helm chart
      kubernetes.core.helm:
        create_namespace: true
        release_namespace: "{{ longhorn_namespace }}"
        release_name: longhorn
        chart_repo_url: "{{ longhorn_repo }}"
        chart_ref: longhorn
        chart_version: "{{ longhorn_version }}"
        wait: true
        values: "{{ longhorn_base_values | combine(longhorn_backup_store_values) }}"
      vars:
        longhorn_base_values:
          persistence:
            defaultClass: true
            defaultClassReplicaCount: "{{ longhorn_replica_count | int }}"
            reclaimPolicy: "{{ longhorn_reclaim_policy }}"
          defaultSettings:
            defaultReplicaCount: "{{ longhorn_replica_count | int }}"
            defaultDataPath: "{{ longhorn_data_path }}"
        longhorn_backup_store_values: >-
          {{
            {
              'defaultBackupStore': {
                'backupTarget': longhorn_backup_target,
                'backupTargetCredentialSecret': longhorn_backup_target_credential_secret,
                'pollInterval': longhorn_backupstore_poll_interval | int,
              }
            } if longhorn_backup_target else {}
          }}
