---
# Directory holding the service source repos. Defaults to the directory that
# contains this deployments repo (i.e. sibling checkouts, .../cyverse-de/).
source_repo_dir: "{{ (playbook_dir ~ '/../..') | realpath }}"
# Path to a service's source repo. Defaults to <source_repo_dir>/<service>;
# override to point at an exact path when the checkout name differs.
source_repo: "{{ source_repo_dir }}/{{ project_name }}"
git_ref: main
image_registry: harbor.cyverse.org
force_rebuild: false
push_images: true
