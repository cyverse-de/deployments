---
- name: install the irods CSI driver
  delegate_to: localhost
  kubernetes.core.helm:
    create_namespace: true
    release_namespace: "{{ irods_csi_driver_namespace }}"
    release_name: irods-csi-driver
    chart_repo_url: https://cyverse.github.io/irods-csi-driver-helm/
    chart_ref: irods-csi-driver
    chart_version: "{{ irods_csi_driver_version }}"
    values:
      globalConfig:
        secret:
          stringData:
            client: "{{ irods_csi_driver_client }}"
            host: "{{ irods_csi_driver_host }}"
            port: "{{ irods_csi_driver_port | string }}"
            zone: "{{ irods_csi_driver_zone }}"
            user: "{{ irods_csi_driver_user}}"
            password: "{{ irods_csi_driver_password }}"
            retainData: "{{ irods_csi_driver_retain_data }}"
            enforceProxyAccess: "{{ irods_csi_driver_enforce_proxy_access }}"
            mountPathWhitelist: "{{ irods_csi_driver_mount_path_white_list }}"
      controllerService:
        # cyverse/irods-csi-driver only publishes amd64 images; arm64 nodes
        # (e.g. EKS Auto's Graviton system NodePool) fail with exec format error.
        nodeSelector:
          kubernetes.io/os: linux
          kubernetes.io/arch: amd64
      nodeService:
        nodeSelector:
          kubernetes.io/os: linux
          kubernetes.io/arch: amd64
        irodsPlugin:
          poolServerEndpoint: "{{ irods_csi_driver_pool_server_endpoint }}"
        irodsPool:
          extraArgs:
            - "--cache_timeout_settings={{ irods_csi_driver_cache_timeout_settings }}"
            - "--cache_size_max={{ irods_csi_driver_cache_size_max }}"
            - "--data_root={{ irods_csi_driver_data_root }}"
      kubeletDir: "{{ irods_csi_driver_kubelet_dir }}"
  register: irods_csi_helm

# Most globalConfig values land in a Secret mounted at /secrets in the driver
# pods. Helm updates the Secret in place, but the Deployment and DaemonSet pod
# templates don't change, so K8s doesn't roll the pods and the driver keeps
# reading the old values until it restarts. Bump a restartedAt annotation when
# the Helm release actually changed so config edits (host, user, password,
# zone, ...) reach the running driver on the next playbook run.
- name: restart the irods CSI driver controller after a config change
  delegate_to: localhost
  kubernetes.core.k8s:
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ irods_csi_driver_namespace }}"
    name: irods-csi-driver-controller
    definition:
      spec:
        template:
          metadata:
            annotations:
              kubectl.kubernetes.io/restartedAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
  when: irods_csi_helm is changed

- name: restart the irods CSI driver node DaemonSet after a config change
  delegate_to: localhost
  kubernetes.core.k8s:
    api_version: apps/v1
    kind: DaemonSet
    namespace: "{{ irods_csi_driver_namespace }}"
    name: irods-csi-driver-node
    definition:
      spec:
        template:
          metadata:
            annotations:
              kubectl.kubernetes.io/restartedAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
  when: irods_csi_helm is changed

- name: define the storage class for the iRODS CSI driver
  environment:
    KUBECONFIG: "{{ lookup('env', 'KUBECONFIG') }}"
  kubernetes.core.k8s:
    state: present
    definition:
      kind: StorageClass
      apiVersion: storage.k8s.io/v1
      metadata:
        name: irods-sc
      provisioner: irods.csi.cyverse.org
