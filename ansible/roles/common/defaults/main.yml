vice_operator_pod_selector: app=vice-operator
vice_operator_api_service_name: vice-operator
vice_operator_api_auth_issuer_url: "{{ keycloak_server_uri }}/realms/{{ keycloak_realm_name }}"
vice_operator_disable_vice_proxy_auth: false
vice_operator_keycloak_base_url: "{{ keycloak_server_uri }}"
vice_operator_keycloak_client_id: vice-users
