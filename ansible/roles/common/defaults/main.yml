# cert-manager settings for Let's Encrypt and Route53. We currently support only Route53, although additional DNS APIs
# may be added in the future. We also currently support only long-term tokens. Please see
# https://cert-manager.io/docs/configuration/acme/dns01/route53/#iam-user-with-long-term-access-key for more details.
# The playbooks still create a self-signed default issuer and a self-signed default cluster issuer when Let's Encrypt is
# enabled in case they're needed for communication within the cluster. For example, the certificate used by NATS and the
# default certificate used by Traefik both use certificate chains that include one of these issuers.
cert_manager_use_letsencrypt: false

# TLS certificate strategy: selfsigned | letsencrypt | external.
#   selfsigned  - cert-manager self-signs a CA + leaf cert per endpoint
#   letsencrypt - cert-manager issues leaf certs from the ACME ClusterIssuer
#   external    - no certs are created; an admin pre-creates the TLS secrets
#                 (see the "Phase 6" cert-manager section of the example
#                 group_vars for the list of secrets and namespaces).
# Defaults from the legacy cert_manager_use_letsencrypt toggle for backward
# compatibility. Set explicitly to 'external' for third-party-CA deployments.
cert_manager_provider: "{{ 'letsencrypt' if cert_manager_use_letsencrypt | default(false) else 'selfsigned' }}"

cert_manager_le_aws_region: us-east-1
cert_manager_le_aws_access_key_id: replace_me
cert_manager_le_aws_secret_access_key: replace_me
cert_manager_le_aws_creds_secret_name: cert-manager-letsencrypt-aws-creds

# The certificate issuer details. Let's Encrypt uses different ACME servers for production and staging:
# staging: https://acme-staging-v02.api.letsencrypt.org/directory
# production: https://acme-v02.api.letsencrypt.org/directory
# Please see https://letsencrypt.org/docs/staging-environment/ for information on when to use the staging
# environment.
cert_manager_le_issuer_name: letsencrypt
cert_manager_le_issuer_email: "{{ email_dest }}"
cert_manager_le_issuer_acme_server: https://acme-v02.api.letsencrypt.org/directory
cert_manager_le_issuer_acme_secret_name: letsencrypt-issuer-key

