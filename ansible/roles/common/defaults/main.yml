# Longhorn replicated block storage
longhorn_enabled: false
longhorn_namespace: longhorn-system
longhorn_version: "1.12.0"
longhorn_repo: https://charts.longhorn.io
# Replicas adapt to cluster size, capped at 3 (a node count of 1 or 2 yields
# 1 or 2 replicas so volumes don't stay degraded). Override per-environment.
longhorn_replica_count: "{{ [groups['k8s_workers'] | length, 3] | min }}"
longhorn_data_path: /var/lib/longhorn
# Retain (vs the chart default Delete) so removing a PVC doesn't immediately
# destroy the underlying data.
longhorn_reclaim_policy: Retain
longhorn_storage_class: longhorn
# Backups are off by default. Longhorn still creates a BackupTarget named
# "default" with an empty URL, which volume creation requires to exist; leaving
# these empty is the supported unconfigured state, not a missing configuration.
# longhorn-manager reads these at startup, so changing them on a running cluster
# requires restarting the longhorn-manager DaemonSet.
longhorn_backup_target: ""
longhorn_backup_target_credential_secret: ""
longhorn_backupstore_poll_interval: 300

# OpenEBS local storage provider (provides the openebs-hostpath StorageClass).
