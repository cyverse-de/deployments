---
- delegate_to: localhost
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  block:
    - name: create the portal-conductor-configs secret
      run_once: true
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: portal-conductor-configs
            namespace: "{{ ns }}"
          data:
            portal-conductor.json: "{{ lookup('template', 'portal-conductor.json.j2') | b64encode }}"
      when: load_configs is undefined or (load_configs | bool)

    - ansible.builtin.include_role:
        name: deploy-service
        tasks_from: main
      vars:
        project_name: portal-conductor
