apiVersion: skaffold/v3
kind: Config
metadata:
  name: maintenance-page
build:
  artifacts:
    - image: harbor.cyverse.org/de/maintenance-page
      custom:
        buildCommand: ./buildx-build.sh
        dependencies:
          paths: ["**"]
  platforms:
    - "linux/amd64"
  tagPolicy:
    gitCommit: {}
  local: {}
manifests:
  rawYaml:
    - k8s/maintenance-page.yaml
deploy:
  kubectl: {}
