apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-recorder
spec:
  replicas: 2
  selector:
    matchLabels:
      de-app: event-recorder
  template:
    metadata:
      labels:
        de-app: event-recorder
    spec:
      restartPolicy: Always
      volumes:
        - name: event-recorder-configs
          secret:
            secretName: event-recorder-configs
            items:
              - key: jobservices.yml
                path: jobservices.yml
      containers:
        - name: event-recorder
          image: harbor.cyverse.org/de/event-recorder
          resources:
            requests:
              cpu: "1m"
              memory: "128Mi"
              ephemeral-storage: "1Gi"
            limits:
              cpu: "100m"
              memory: "256Mi"
              ephemeral-storage: "1Gi"
          args:
            - --config
            - /etc/iplant/de/jobservices.yml
          env:
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: timezone
                  key: timezone
            - name: OTEL_TRACES_EXPORTER
              valueFrom:
                secretKeyRef:
                  name: configs
                  key: OTEL_TRACES_EXPORTER
            - name: OTEL_EXPORTER_JAEGER_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: configs
                  key: OTEL_EXPORTER_JAEGER_HTTP_ENDPOINT
          volumeMounts:
            - name: event-recorder-configs
              mountPath: /etc/iplant/de
              readOnly: true
