apiVersion: skaffold/v3
kind: Config
metadata:
  name: apps
build:
  artifacts:
    - image: harbor.cyverse.org/de/apps
      custom:
        buildCommand: ./buildx-build.sh
        dependencies:
          paths: ["**"]
  tagPolicy:
    gitCommit: {}
  local: {}
  platforms:
    - linux/amd64
manifests:
  rawYaml:
    - k8s/apps.yml
deploy:
  kubectl: {}
