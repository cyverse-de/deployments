---
- delegate_to: localhost
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  block:
    - name: create the dashboard-aggregator-configs secret
      run_once: true
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: dashboard-aggregator-configs
            namespace: "{{ ns }}"
          data:
            dashboard-aggregator.yaml: "{{ lookup('template', 'dashboard-aggregator.yaml.j2') | b64encode }}"
      when: load_configs is undefined or (load_configs | bool)

    - ansible.builtin.include_role:
        name: deploy-service
        tasks_from: main
      vars:
        project_name: dashboard-aggregator
