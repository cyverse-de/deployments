---
- name: Gather service facts
  ansible.builtin.service_facts:

- name: Set firewall fact
  ansible.builtin.set_fact:
    active_firewall: >-
      {% if ansible_facts.services['firewalld.service'] is defined
          and ansible_facts.services['firewalld.service'].state == 'running' %}firewalld
      {%- elif ansible_facts.services['ufw.service'] is defined
            and ansible_facts.services['ufw.service'].state == 'running' %}ufw
      {%- else %}none{% endif %}

- name: Open the HTTP/S Port
  become: true
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  with_items:
    - port: 80
      proto: tcp
    - port: 443
      proto: tcp
  when: active_firewall == "ufw"

- name: Open the HTTP/S port
  become: true
  ansible.posix.firewalld:
    permanent: true
    immediate: true
    zone: public
    state: enabled
    port: "{{ item }}"
  notify: Reload firewalld
  with_items:
    - "80/tcp"
    - "443/tcp"
  when: active_firewall == "firewalld"

# Cluster nodes fall into the internal zone (ipset source match), and pod
# traffic hairpinning to the ingress is SNAT'd to the node IP, so in-cluster
# clients (e.g. vice-proxy calling Keycloak) need these ports there too.
- name: Open the HTTP/S port in the internal zone
  become: true
  ansible.posix.firewalld:
    permanent: true
    immediate: true
    zone: internal
    state: enabled
    port: "{{ item }}"
  notify: Reload firewalld
  with_items:
    - "80/tcp"
    - "443/tcp"
  when: active_firewall == "firewalld"

- name: Set repo_dir fact
  ansible.builtin.set_fact:
    repo_dir: "{{ inventory_dir | dirname }}"

- name: Set secrets_dir fact
  ansible.builtin.set_fact:
    secrets_dir: "{{ [repo_dir, secrets_loader_base_dir] | path_join }}"

- name: Configure ui haproxy settings
  become: true
  ansible.builtin.blockinfile:
    dest: /etc/haproxy/haproxy.cfg
    append_newline: true
    prepend_newline: true
    marker: "# {mark} DE UI HAProxy Settings"
    block: "{{ lookup('template', '01_de.cfg.j2') }}"
  notify: Restart haproxy
