---
- name: Add pod-cleaner service account
  delegate_to: localhost
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: pod-cleaner
        namespace: "{{ ns }}"
      automountServiceAccountToken: true

- name: Create the pod-cleaner role
  delegate_to: localhost
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: pod-cleaner
        namespace: "{{ ns }}"
      rules:
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["get", "watch", "list", "delete"]

- name: Create the pod-cleaner role binding
  delegate_to: localhost
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  kubernetes.core.k8s:
    state: present
    definition:
      kind: RoleBinding
      apiVersion: rbac.authorization.k8s.io/v1
      metadata:
        name: pod-cleaner
        namespace: "{{ ns }}"
      subjects:
        - kind: ServiceAccount
          name: pod-cleaner
          namespace: "{{ ns }}"
      roleRef:
        kind: Role
        name: pod-cleaner
        apiVersion: rbac.authorization.k8s.io/v1

- name: Add cronjob to clean failed pods
  delegate_to: localhost
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: cronjob-clean-failed-pods
        namespace: "{{ ns }}"
      spec:
        schedule: "*/5 * * * *"
        concurrencyPolicy: Forbid
        failedJobHistoryLimit: 4
        jobTemplate:
          spec:
            backoffLimit: 0
            parallelism: 1
            completions: 1
            template:
              spec:
                serviceAccountName: pod-cleaner
                restartPolicy: Never
                containers:
                  - name: clean-failed-jobs
                    image: bitnami/kubectl:1.29.2
                    imagePullPolicy: IfNotPresent
                    args: ["delete", "pods", "--field-selector", "status.phase=Failed"]


- name: Add cronjob to clean completed pods
  delegate_to: localhost
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: cronjob-clean-completed-pods
        namespace: "{{ ns }}"
      spec:
        schedule: "*/5 * * * *"
        concurrencyPolicy: Forbid
        failedJobHistoryLimit: 4
        jobTemplate:
          spec:
            backoffLimit: 0
            parallelism: 1
            completions: 1
            template:
              spec:
                serviceAccountName: pod-cleaner
                restartPolicy: Never
                containers:
                  - name: clean-failed-jobs
                    image: bitnami/kubectl:1.29.2
                    imagePullPolicy: IfNotPresent
                    args: ["delete", "pods", "--field-selector", "status.phase=Completed"]
