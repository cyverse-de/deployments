---
- delegate_to: localhost
  environment:
    KUBECONFIG: "{{ lookup('env', 'KUBECONFIG') }}"
  block:
    - name: define the self-siged CA certificate for the DE
      when: not cert_manager_use_letsencrypt
      kubernetes.core.k8s:
        name: "{{ de_tls_ca_name }}"
        namespace: "{{ ns }}"
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: Certificate
          metadata:
            name: "{{ de_tls_ca_name }}"
          spec:
            isCA: true
            commonName: "{{ de_tls_ca_name }}"
            secretName: "{{ de_tls_ca_name }}"
            duration: "{{ de_tls_ca_duration }}"
            renewBefore: "{{ de_tls_ca_renew_before }}"
            privateKey:
              algorithm: ECDSA
              size: 256
            issuerRef:
              name: default-cluster-issuer
              kind: ClusterIssuer
              group: cert-manager.io

    - name: create the local certificate issuer for the DE
      when: not cert_manager_use_letsencrypt
      kubernetes.core.k8s:
        name: "{{ de_tls_issuer_name }}"
        namespace: "{{ ns }}"
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: Issuer
          metadata:
            name: "{{ de_tls_issuer_name }}"
          spec:
            ca:
              secretName: "{{ de_tls_ca_name }}"

    - name: create the locally signed TLS certificate for the DE
      when: not cert_manager_use_letsencrypt
      kubernetes.core.k8s:
        name: "{{ de_tls_cert_name }}"
        namespace: "{{ ns }}"
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: Certificate
          metadata:
            name: "{{ de_tls_cert_name }}"
          spec:
            secretName: "{{ de_tls_cert_name }}"
            duration: "{{ de_tls_cert_duration }}"
            renewBefore: "{{ de_tls_cert_renew_before }}"
            issuerRef:
              name: "{{ de_tls_issuer_name }}"
              kind: Issuer
            commonName: "{{ de_hostname }}"
            dnsNames:
              - localhost
              - "{{ de_hostname }}"

    - name: create the TLS certificate for the DE using letsencrypt
      when: cert_manager_use_letsencrypt
      kubernetes.core.k8s:
        name: "{{ de_tls_cert_name }}"
        namespace: "{{ ns }}"
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: Certificate
          metadata:
            name: "{{ de_tls_cert_name }}"
          spec:
            secretName: "{{ de_tls_cert_name }}"
            duration: "{{ de_tls_cert_duration }}"
            renewBefore: "{{ de_tls_cert_renew_before }}"
            issuerRef:
              name: "{{ cert_manager_le_issuer_name }}"
              kind: ClusterIssuer
            commonName: "{{ de_hostname }}"
            dnsNames:
              - "{{ de_hostname }}"

    - name: define the gateway for the DE
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: Gateway
          metadata:
            name: discoenv
            namespace: "{{ ns }}"
          spec:
            gatewayClassName: "{{ gateway_class_name }}"
            listeners:
              - hostname: "{{ de_hostname }}"
                name: discoenv-http
                port: 8000
                protocol: HTTP
              - hostname: "{{ de_hostname }}"
                name: discoenv-https
                port: 8443
                protocol: HTTPS
                tls:
                  certificateRefs:
                    - kind: Secret
                      group: ""
                      name: "{{ de_tls_cert_name }}"

    - name: define the CORS middleware for the DE
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: traefik.io/v1alpha1
          kind: Middleware
          metadata:
            name: discoenv-cors-headers
            namespace: "{{ ns }}"
          spec:
            headers:
              accessControlAllowOriginList:
                - "*"
              accessControlAllowMethods:
                - "GET"
                - "POST"
                - "OPTIONS"
              accessControlAllowHeaders:
                - "Authorization"
                - "DNT"
                - "Keep-Alive"
                - "User-Agent"
                - "X-Requested-With"
                - "If-Modified-Since"
                - "Cache-Control"
                - "Content-Type"
                - "Content-Range"
                - "Range"
              accessControlAllowCredentials: true
              accessControlMaxAge: 86400
      when: gateway_provider == "traefik"

    - name: define the CORS middleware for VICE
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: traefik.io/v1alpha1
          kind: Middleware
          metadata:
            name: vice-cors-headers
            namespace: "{{ vice_ns }}"
          spec:
            headers:
              accessControlAllowOriginList:
                - "*"
              accessControlAllowMethods:
                - "GET"
                - "POST"
                - "OPTIONS"
              accessControlAllowHeaders:
                - "Authorization"
                - "DNT"
                - "Keep-Alive"
                - "User-Agent"
                - "X-Requested-With"
                - "If-Modified-Since"
                - "Cache-Control"
                - "Content-Type"
                - "Content-Range"
                - "Range"
              accessControlAllowCredentials: true
              accessControlMaxAge: 86400
      when: gateway_provider == "traefik"

    - name: define the routes for the DE when the gateway provider is Traefik
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: discoenv-routes
            namespace: "{{ ns }}"
          spec:
            hostnames:
              - "{{ de_hostname }}"
            parentRefs:
              - name: discoenv
            rules:
              - backendRefs:
                  - name: kifshare
                    port: 80
                filters:
                  - type: ExtensionRef
                    extensionRef:
                      group: traefik.io
                      kind: Middleware
                      name: discoenv-cors-headers
                matches:
                  - path:
                      type: PathPrefix
                      value: /anon-files
                timeouts:
                  request: "24h"
                  backendRequest: "24h"
              - backendRefs:
                  - name: kifshare
                    port: 80
                filters:
                  - type: ExtensionRef
                    extensionRef:
                      group: traefik.io
                      kind: Middleware
                      name: discoenv-cors-headers
                matches:
                  - path:
                      type: PathPrefix
                      value: /dl
                timeouts:
                  request: "24h"
                  backendRequest: "24h"
              - backendRefs:
                  - name: terrain
                    port: 80
                filters:
                  - type: ExtensionRef
                    extensionRef:
                      group: traefik.io
                      kind: Middleware
                      name: discoenv-cors-headers
                matches:
                  - path:
                      type: PathPrefix
                      value: /terrain
                timeouts:
                  request: "24h"
                  backendRequest: "24h"
              - backendRefs:
                  - name: job-status-listener
                    port: 80
                filters:
                  - type: URLRewrite
                    urlRewrite:
                      path:
                        type: ReplacePrefixMatch
                        replacePrefixMatch: /
                  - type: ExtensionRef
                    extensionRef:
                      group: traefik.io
                      kind: Middleware
                      name: discoenv-cors-headers
                matches:
                  - path:
                      type: PathPrefix
                      value: /job
              - backendRefs:
                  - name: formation
                    port: 80
                filters:
                  - type: ExtensionRef
                    extensionRef:
                      group: traefik.io
                      kind: Middleware
                      name: discoenv-cors-headers
                matches:
                  - path:
                      type: PathPrefix
                      value: /formation
              # RFC 8414/9728 root-form OAuth discovery paths for the MCP
              # server; clients derive these from the issuer URL, so they
              # must resolve at the host root rather than under /formation.
              - backendRefs:
                  - name: formation
                    port: 80
                filters:
                  - type: ExtensionRef
                    extensionRef:
                      group: traefik.io
                      kind: Middleware
                      name: discoenv-cors-headers
                matches:
                  - path:
                      type: PathPrefix
                      value: /.well-known/oauth-protected-resource/formation
                  - path:
                      type: PathPrefix
                      value: /.well-known/oauth-authorization-server/formation
                  - path:
                      type: PathPrefix
                      value: /.well-known/openid-configuration/formation
              - backendRefs:
                  - name: sonora
                    port: 80
                filters:
                  - type: ExtensionRef
                    extensionRef:
                      group: traefik.io
                      kind: Middleware
                      name: discoenv-cors-headers
                matches:
                  - path:
                      type: PathPrefix
                      value: /
                timeouts:
                  request: "24h"
                  backendRequest: "24h"
      when: gateway_provider == "traefik"

    - name: define the routes for the DE when provider-specific customizations aren't needed.
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: discoenv-routes
            namespace: "{{ ns }}"
          spec:
            hostnames:
              - "{{ de_hostname }}"
            parentRefs:
              - name: discoenv
            rules:
              - backendRefs:
                  - name: kifshare
                    port: 80
                matches:
                  - path:
                      type: PathPrefix
                      value: /anon-files
                timeouts:
                  request: "24h"
                  backendRequest: "24h"
              - backendRefs:
                  - name: kifshare
                    port: 80
                matches:
                  - path:
                      type: PathPrefix
                      value: /dl
                timeouts:
                  request: "24h"
                  backendRequest: "24h"
              - backendRefs:
                  - name: terrain
                    port: 80
                matches:
                  - path:
                      type: PathPrefix
                      value: /terrain
                timeouts:
                  request: "24h"
                  backendRequest: "24h"
              - backendRefs:
                  - name: job-status-listener
                    port: 80
                filters:
                  - type: URLRewrite
                    urlRewrite:
                      path:
                        type: ReplacePrefixMatch
                        replacePrefixMatch: /
                matches:
                  - path:
                      type: PathPrefix
                      value: /job
              - backendRefs:
                  - name: formation
                    port: 80
                matches:
                  - path:
                      type: PathPrefix
                      value: /formation
              # RFC 8414/9728 root-form OAuth discovery paths for the MCP
              # server; clients derive these from the issuer URL, so they
              # must resolve at the host root rather than under /formation.
              - backendRefs:
                  - name: formation
                    port: 80
                matches:
                  - path:
                      type: PathPrefix
                      value: /.well-known/oauth-protected-resource/formation
                  - path:
                      type: PathPrefix
                      value: /.well-known/oauth-authorization-server/formation
                  - path:
                      type: PathPrefix
                      value: /.well-known/openid-configuration/formation
              - backendRefs:
                  - name: sonora
                    port: 80
                matches:
                  - path:
                      type: PathPrefix
                      value: /
                timeouts:
                  request: "24h"
                  backendRequest: "24h"
      # Add new providers to this list as providers are added so that other provider-specific routes aren't overwritten.
      when: gateway_provider not in ["traefik"]

    - name: create the locally signed TLS certificate for the user portal
      when: not cert_manager_use_letsencrypt
      kubernetes.core.k8s:
        name: "{{ user_portal_tls_cert_name }}"
        namespace: "{{ ns }}"
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: Certificate
          metadata:
            name: "{{ user_portal_tls_cert_name }}"
          spec:
            secretName: "{{ user_portal_tls_cert_name }}"
            duration: "{{ user_portal_tls_cert_duration }}"
            renewBefore: "{{ user_portal_tls_cert_renew_before }}"
            issuerRef:
              name: "{{ de_tls_issuer_name }}"
              kind: Issuer
            commonName: "{{ portal_hostname }}"
            dnsNames:
              - localhost
              - "{{ portal_hostname }}"

    - name: create the TLS certificate for the user portal using letsencrypt
      when: cert_manager_use_letsencrypt
      kubernetes.core.k8s:
        name: "{{ user_portal_tls_cert_name }}"
        namespace: "{{ ns }}"
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: Certificate
          metadata:
            name: "{{ user_portal_tls_cert_name }}"
          spec:
            secretName: "{{ user_portal_tls_cert_name }}"
            duration: "{{ user_portal_tls_cert_duration }}"
            renewBefore: "{{ user_portal_tls_cert_renew_before }}"
            issuerRef:
              name: "{{ cert_manager_le_issuer_name }}"
              kind: ClusterIssuer
            commonName: "{{ portal_hostname }}"
            dnsNames:
              - "{{ portal_hostname }}"

    - name: define the gateway for the user portal
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: Gateway
          metadata:
            name: portal
            namespace: "{{ ns }}"
          spec:
            gatewayClassName: "{{ gateway_class_name }}"
            listeners:
              - hostname: "{{ portal_hostname }}"
                name: portal-http
                port: 8000
                protocol: HTTP
              - hostname: "{{ portal_hostname }}"
                name: portal-https
                port: 8443
                protocol: HTTPS
                tls:
                  certificateRefs:
                    - kind: Secret
                      group: ""
                      name: "{{ user_portal_tls_cert_name }}"

    - name: define the routes for the user portal
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: portal-routes
            namespace: "{{ ns }}"
          spec:
            hostnames:
              - "{{ portal_hostname }}"
            parentRefs:
              - name: portal
            rules:
              - backendRefs:
                  - name: user-portal
                    port: 3000

    - name: define the self-signed CA certificate for VICE
      when: not cert_manager_use_letsencrypt
      kubernetes.core.k8s:
        name: "{{ vice_tls_ca_name }}"
        namespace: "{{ ns }}"
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: Certificate
          metadata:
            name: "{{ vice_tls_ca_name }}"
          spec:
            isCA: true
            commonName: "{{ vice_tls_ca_name }}"
            secretName: "{{ vice_tls_ca_name }}"
            duration: "{{ vice_tls_ca_duration }}"
            renewBefore: "{{ vice_tls_ca_renew_before }}"
            privateKey:
              algorithm: ECDSA
              size: 256
            issuerRef:
              name: default-cluster-issuer
              kind: ClusterIssuer
              group: cert-manager.io

    - name: create the locally signed certificate issuer for VICE
      when: not cert_manager_use_letsencrypt
      kubernetes.core.k8s:
        name: "{{ vice_tls_issuer_name }}"
        namespace: "{{ ns }}"
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: Issuer
          metadata:
            name: "{{ vice_tls_issuer_name }}"
          spec:
            ca:
              secretName: "{{ vice_tls_ca_name }}"

    - name: create the locally signed TLS certificate for VICE
      when: not cert_manager_use_letsencrypt
      kubernetes.core.k8s:
        name: "{{ vice_tls_cert_name }}"
        namespace: "{{ ns }}"
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: Certificate
          metadata:
            name: "{{ vice_tls_cert_name }}"
          spec:
            secretName: "{{ vice_tls_cert_name }}"
            duration: "{{ vice_tls_cert_duration }}"
            renewBefore: "{{ vice_tls_cert_renew_before }}"
            issuerRef:
              name: "{{ vice_tls_issuer_name }}"
              kind: Issuer
            commonName: "*.{{ ns }}.svc.cluster.local"
            dnsNames:
              - localhost
              - "{{ vice_wildcard_fqdn }}"

    - name: create the TLS certificate for VICE using letsencrypt
      when: cert_manager_use_letsencrypt
      kubernetes.core.k8s:
        name: "{{ vice_tls_cert_name }}"
        namespace: "{{ ns }}"
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: Certificate
          metadata:
            name: "{{ vice_tls_cert_name }}"
          spec:
            secretName: "{{ vice_tls_cert_name }}"
            duration: "{{ vice_tls_cert_duration }}"
            renewBefore: "{{ vice_tls_cert_renew_before }}"
            issuerRef:
              name: "{{ cert_manager_le_issuer_name }}"
              kind: ClusterIssuer
            commonName: "{{ vice_wildcard_fqdn }}"
            dnsNames:
              - "{{ vice_wildcard_fqdn }}"

    - name: define the gateway for VICE
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: Gateway
          metadata:
            name: vice
            namespace: "{{ ns }}"
          spec:
            gatewayClassName: "{{ gateway_class_name }}"
            listeners:
              - allowedRoutes:
                  namespaces:
                    from: Selector
                    selector:
                      matchLabels:
                        has-vice-routes: "true"
                hostname: "{{ vice_wildcard_fqdn }}"
                name: vice-http
                port: 8000
                protocol: HTTP
              - allowedRoutes:
                  namespaces:
                    from: Selector
                    selector:
                      matchLabels:
                        has-vice-routes: "true"
                hostname: "{{ vice_wildcard_fqdn }}"
                name: vice-https
                port: 8443
                protocol: HTTPS
                tls:
                  certificateRefs:
                    - kind: Secret
                      group: ""
                      name: "{{ vice_tls_cert_name }}"

    - name: define the default route for VICE
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: vice-default-route
            namespace: "{{ ns }}"
          spec:
            hostnames:
              - "{{ vice_wildcard_fqdn }}"
            parentRefs:
              - name: vice
            rules:
              - backendRefs:
                  - name: vice-default-backend
                    port: 80
