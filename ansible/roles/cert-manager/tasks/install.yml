---
- delegate_to: localhost
  environment:
    KUBECONFIG: "{{ lookup('env', 'KUBECONFIG') }}"
  block:
    - name: Install the cert-manager helm repo
      kubernetes.core.helm_repository:
        name: jetstack
        repo_url: "https://charts.jetstack.io"
        state: present

    - name: Install the cert-manager chart
      kubernetes.core.helm:
        name: cert-manager
        chart_ref: jetstack/cert-manager
        release_namespace: cert-manager
        create_namespace: true
        wait: true
        values:
          installCRDs: true
          prometheus:
            enabled: false

    - name: Wait for cert-manager deployment to be available
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: cert-manager
        name: cert-manager
        wait: true
        wait_timeout: 300
        wait_condition:
          type: Available
          status: "True"
          reason: MinimumReplicasAvailable

    - name: Wait for cert-manager-webhook deployment to be available
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: cert-manager
        name: cert-manager-webhook
        wait: true
        wait_timeout: 300
        wait_condition:
          type: Available
          status: "True"
          reason: MinimumReplicasAvailable

    - name: Wait for cert-manager-cainjector deployment to be available
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: cert-manager
        name: cert-manager-cainjector
        wait: true
        wait_timeout: 300
        wait_condition:
          type: Available
          status: "True"
          reason: MinimumReplicasAvailable
