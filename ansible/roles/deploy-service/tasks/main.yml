---
- name: Deploy service via skaffold
  tags:
    - deploy
  block:
    - name: Builds dir
      delegate_to: localhost
      ansible.builtin.debug:
        msg: "{{ build_json_dir }}"

    - name: Read the build JSON file
      delegate_to: localhost
      ansible.builtin.set_fact:
        build_json: "{{ lookup('file', build_json_dir + '/' + project_name + '.json') | from_json }}"

    - name: Image tag
      delegate_to: localhost
      ansible.builtin.debug:
        msg: "{{ build_json.builds[0].tag }}"

    - name: Run skaffold deploy
      delegate_to: localhost
      run_once: true
      ansible.builtin.command:
        chdir: "{{ de_releases_dir }}/services/{{ project_name }}"
        cmd: skaffold deploy --namespace "{{ ns }}" --build-artifacts "../../builds/{{ project_name }}.json" --force --kubeconfig "{{ lookup('env',
          'KUBECONFIG') }}"
