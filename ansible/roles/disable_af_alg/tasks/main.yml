---
- name: validate disable_af_alg_state
  ansible.builtin.assert:
    that:
      - disable_af_alg_state in ['present', 'absent']
    fail_msg: >-
      disable_af_alg_state must be 'present' or 'absent',
      got: {{ disable_af_alg_state }}

# Use include_tasks (dynamic) so the unused branch is not parsed — keeps
# install-only constructs (meta: flush_handlers, etc.) out of removal runs.
- name: install the AF_ALG mitigation
  ansible.builtin.include_tasks: install.yml
  when: disable_af_alg_state == 'present'

- name: remove the AF_ALG mitigation
  ansible.builtin.include_tasks: remove.yml
  when: disable_af_alg_state == 'absent'
