---
region_code: us-east-1
cluster_name: ua-ai-sandboxes
gateway_class_name: traefik
storage_class_name: auto-ebs-sc

# --- cert-manager ---
cert_manager_namespace: cert-manager
cert_manager_chart_version: ""

# Let's Encrypt + Route 53 DNS-01.
# Static AWS keys for v1; Pod Identity is the planned follow-up.
cert_manager_le_issuer_name: letsencrypt
cert_manager_le_issuer_email: replace_me
cert_manager_le_issuer_acme_server: https://acme-v02.api.letsencrypt.org/directory
cert_manager_le_issuer_acme_secret_name: letsencrypt-issuer-key
cert_manager_le_aws_region: "{{ region_code }}"
cert_manager_le_aws_access_key_id: replace_me
cert_manager_le_aws_secret_access_key: replace_me
cert_manager_le_aws_creds_secret_name: cert-manager-letsencrypt-aws-creds

# --- Traefik ---
traefik_namespace: traefik
traefik_chart_version: ""
traefik_cert_name: traefik-tls
traefik_cert_duration: "2160h"
traefik_cert_renew_before: "240h"

# The wildcard hostname Traefik will terminate TLS for. Set vice_base_domain
# to the public host (e.g. cyverse.run); the wildcard is derived from it.
vice_base_domain: replace_me
vice_wildcard_fqdn: "*.{{ vice_base_domain }}"

# Gateway API CRDs
gateway_api_crd_version: "v1.4.0"
gateway_api_crd_url: "https://github.com/kubernetes-sigs/gateway-api/releases/download/{{ gateway_api_crd_version }}/standard-install.yaml"

# --- NodePools (Karpenter, provisioned by EKS Auto Mode) ---
# Operator-side constants in app-exposer's constants/constants.go drive the
# label/taint shape: VICE pods require nodes with an `analysis` label, and
# GPU pods additionally tolerate `gpu=true:NoSchedule` and select on `gpu=true`.
nodepool_cpu_name: analysis-cpu
nodepool_cpu_instance_categories:
  - c
  - m
  - r
nodepool_cpu_capacity_types:
  - on-demand

nodepool_gpu_name: analysis-gpu
# Each instance family below maps to one NVIDIA GPU model on AWS:
#   g4dn → T4 (16 GB)         p4d  → A100 SXM4 40 GB
#   g5   → A10G (24 GB)       p4de → A100 SXM4 80 GB
#   g6   → L4 (24 GB)         p5   → H100 (80 GB)
#   g6e  → L40S (48 GB)       p5e  → H200 (141 GB)
#   gr6  → L4 (24 GB, mem-heavy ratio)
#                             p5en → H200 (141 GB)
# Karpenter only provisions on demand, so listing a family does not
# itself create capacity or cost; matching pods are what trigger
# provisioning.
nodepool_gpu_instance_families:
  - g4dn
  - g5
  - g6
  - g6e
  - gr6
  - p4d
  - p4de
  - p5
  - p5e
  - p5en
nodepool_gpu_capacity_types:
  - on-demand
