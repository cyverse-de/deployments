---
- delegate_to: localhost
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  block:
    - name: add the jetstack helm repo
      kubernetes.core.helm_repository:
        name: jetstack
        repo_url: "https://charts.jetstack.io"
        state: present

    - name: install the cert-manager chart
      kubernetes.core.helm:
        name: cert-manager
        chart_ref: jetstack/cert-manager
        chart_version: "{{ cert_manager_chart_version | default(omit, true) }}"
        release_namespace: "{{ cert_manager_namespace }}"
        create_namespace: true
        wait: true
        values:
          installCRDs: true
          prometheus:
            enabled: false

    - name: wait for cert-manager deployments to be available
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: "{{ cert_manager_namespace }}"
        name: "{{ item }}"
        wait: true
        wait_timeout: 300
        wait_condition:
          type: Available
          status: "True"
          reason: MinimumReplicasAvailable
      loop:
        - cert-manager
        - cert-manager-webhook
        - cert-manager-cainjector

    - name: create the route53 credentials secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ cert_manager_le_aws_creds_secret_name }}"
            namespace: "{{ cert_manager_namespace }}"
          type: Opaque
          data:
            access-key-id: "{{ cert_manager_le_aws_access_key_id | b64encode }}"
            secret-access-key: "{{ cert_manager_le_aws_secret_access_key | b64encode }}"

    - name: create the Let's Encrypt ClusterIssuer
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: "{{ cert_manager_le_issuer_name }}"
          spec:
            acme:
              email: "{{ cert_manager_le_issuer_email }}"
              server: "{{ cert_manager_le_issuer_acme_server }}"
              privateKeySecretRef:
                name: "{{ cert_manager_le_issuer_acme_secret_name }}"
              solvers:
                - dns01:
                    cnameStrategy: Follow
                    route53:
                      region: "{{ cert_manager_le_aws_region }}"
                      accessKeyIDSecretRef:
                        name: "{{ cert_manager_le_aws_creds_secret_name }}"
                        key: access-key-id
                      secretAccessKeySecretRef:
                        name: "{{ cert_manager_le_aws_creds_secret_name }}"
                        key: secret-access-key
