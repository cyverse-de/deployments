---
- name: Create the Harbor namespace
  delegate_to: localhost
  environment:
    KUBECONFIG: "{{ lookup('env', 'KUBECONFIG') }}"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ harbor_namespace }}"

- name: Configure the Harbor TLS certificate
  ansible.builtin.include_tasks: certs.yml

- name: Add the harbor helm repository
  delegate_to: localhost
  environment:
    KUBECONFIG: "{{ lookup('env', 'KUBECONFIG') }}"
  kubernetes.core.helm_repository:
    name: harbor
    repo_url: "{{ harbor_repo }}"
    state: present

# Traefik fronts Harbor through a Gateway/HTTPRoute (see gateway.yml), so the
# chart only needs a clusterIP service and TLS is terminated at the gateway.
# ingress-nginx uses the chart's own Ingress, terminating TLS with the
# cert-manager-issued harbor-tls secret.
- name: Use Gateway API exposure for Harbor (Traefik)
  ansible.builtin.set_fact:
    harbor_expose:
      type: clusterIP
      tls:
        enabled: false
  when: gateway_provider == "traefik"

- name: Use Ingress exposure for Harbor (ingress-nginx)
  ansible.builtin.set_fact:
    harbor_expose:
      type: ingress
      tls:
        enabled: true
        certSource: secret
        secret:
          secretName: "{{ harbor_tls_cert_name }}"
      ingress:
        className: "{{ harbor_ingress_class_name }}"
        hosts:
          core: "{{ harbor_fqdn }}"
  when: gateway_provider != "traefik"

- name: Install the harbor helm chart
  delegate_to: localhost
  environment:
    KUBECONFIG: "{{ lookup('env', 'KUBECONFIG') }}"
  kubernetes.core.helm:
    name: harbor
    chart_ref: harbor/harbor
    create_namespace: true
    release_namespace: "{{ harbor_namespace }}"
    wait: true
    values:
      externalURL: "https://{{ harbor_fqdn }}"
      expose: "{{ harbor_expose }}"
      portal:
        replicas: "{{ harbor_replicas }}"
      core:
        replicas: "{{ harbor_replicas }}"
      jobservice:
        replicas: "{{ harbor_replicas }}"
      registry:
        replicas: "{{ harbor_replicas }}"
      chartmuseum:
        replicas: "{{ harbor_replicas }}"
      clair:
        replicas: "{{ harbor_replicas }}"
      notary:
        server:
          replicas: "{{ harbor_replicas }}"
        signer:
          replicas: "{{ harbor_replicas }}"
      persistence:
        persistentVolumeClaim:
          registry:
            accessMode: ReadWriteMany
            storageClass: "{{ harbor_storage_class }}"
          chartmuseum:
            accessMode: ReadWriteMany
            storageClass: "{{ harbor_storage_class }}"
          jobservice:
            accessMode: ReadWriteMany
            storageClass: "{{ harbor_storage_class }}"
      database:
        type: external
        external:
          host: "{{ groups['dbms'][0] }}"
          port: "{{ pg_listen_port }}"
          username: "{{ harbor_database_user }}"
          password: "{{ harbor_database_password }}"
          coreDatabase: "{{ harbor_core_db_name }}"
          clairDatabase: "{{ harbor_clair_db_name }}"
          notaryServerDatabase: "{{ harbor_notary_server_db_name }}"
          notarySignerDatabase: "{{ harbor_notary_signer_db_name }}"
          sslMode: "disable"

- name: Configure the Harbor gateway route
  ansible.builtin.include_tasks: gateway.yml
  when: gateway_provider == "traefik"
