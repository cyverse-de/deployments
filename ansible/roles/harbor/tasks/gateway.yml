---
- name: Configure the Gateway API resources for Harbor
  delegate_to: localhost
  environment:
    KUBECONFIG: "{{ lookup('env', 'KUBECONFIG') }}"
  block:
    - name: Define the gateway for Harbor
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: Gateway
          metadata:
            name: harbor
            namespace: "{{ harbor_namespace }}"
          spec:
            gatewayClassName: "{{ gateway_class_name }}"
            listeners:
              - hostname: "{{ harbor_fqdn }}"
                name: harbor-http
                port: 8000
                protocol: HTTP
              - hostname: "{{ harbor_fqdn }}"
                name: harbor-https
                port: 8443
                protocol: HTTPS
                tls:
                  certificateRefs:
                    - kind: Secret
                      group: ""
                      name: "{{ harbor_tls_cert_name }}"

    - name: Define the HTTPRoute for Harbor
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: harbor
            namespace: "{{ harbor_namespace }}"
          spec:
            hostnames:
              - "{{ harbor_fqdn }}"
            parentRefs:
              - name: harbor
            rules:
              - backendRefs:
                  - name: harbor
                    port: 80
