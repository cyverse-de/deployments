---
- name: Deploy in-cluster OpenLDAP
  delegate_to: localhost
  run_once: true
  when: ldap_in_cluster | bool
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  block:
    - name: Create the namespace for openldap
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ ldap_ns }}"

    # The openldap-docker manifest mounts these two secrets; skaffold deploy only
    # applies the rawYaml manifest, so we render them here before deploying.
    - name: Create the openldap-config secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: openldap-config
            namespace: "{{ ldap_ns }}"
          type: Opaque
          data:
            slapd.conf: "{{ lookup('template', 'slapd.conf.j2') | b64encode }}"

    - name: Create the openldap-seed secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: openldap-seed
            namespace: "{{ ldap_ns }}"
          type: Opaque
          data:
            data.ldif: "{{ lookup('template', 'seed.ldif.j2') | b64encode }}"

    - name: Deploy openldap via skaffold
      ansible.builtin.include_role:
        name: deploy-service
        tasks_from: main
      vars:
        project_name: openldap-docker
        deploy_ns: "{{ ldap_ns }}"
