# Clones all cyverse source repositories into source_repo_dir, skipping any
# already cloned. Needs no inventory; clones run on the local machine.
#
# Variables (all default in the common role):
#   source_repo_dir:   where to clone the repos (default: the directory
#                      containing this deployments repo).
#   cyverse_repo_base: default org base URL (default: git@github.com:cyverse-de).
#   source_repos:      the list of repos to clone.
#   source_repo_urls:  per-repo URL overrides (e.g. qms -> cyverse org).
#
# Cloning over SSH needs a configured GitHub SSH key. For HTTPS instead, set
# -e cyverse_repo_base=https://github.com/cyverse-de (and a credential helper
# such as `gh auth setup-git` for private repos).

---
- name: clone the cyverse source repositories
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  roles:
    - clone-sources
