# Builds service images and rewrites each roles/services/<svc>/files/<svc>.json.
# Select a service with its tag, e.g. `--tags app-exposer`.
#
# Variables:
#   source_repo_dir: directory holding the service source repos
#                    (default: the directory containing this deployments repo).
#   source_repo:     exact path to a service's source repo
#                    (default: <source_repo_dir>/<service>).
#   git_ref:         the git ref to build (default: main).
#   image_registry:  the target image registry (default: harbor.cyverse.org).
#   force_rebuild:   bypass skaffold's artifact cache when true (default: false).
#   push_images:     push the built image and update the descriptor when true;
#                    build only (no push, descriptor untouched) when false (default: true).
#
# A `docker login` to the target registry must already be in place. Builds run
# through a custom buildx builder that reads/writes a `<image>:cache` registry
# layer cache; the role creates a container-driver `de-builder` automatically.

---
- name: build services
  # Runs entirely on the control machine (connection: local); targeting
  # k8s_controllers[0] instead of the implicit localhost is what resolves the
  # inventory's group_vars (image_registry, build_json_dir overrides, etc.).
  hosts: k8s_controllers[0]
  connection: local
  gather_facts: false
  become: false
  tasks:
    - ansible.builtin.include_role:
        name: services/maintenance-page
        tasks_from: build
        apply:
          tags: maintenance-page
      tags: maintenance-page
